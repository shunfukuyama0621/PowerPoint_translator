<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>不動産資料 翻訳ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      [v-cloak] { display: none; }
      .drop-active { border-color: #2563eb; background-color: #eff6ff; }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen">
    <div class="max-w-3xl mx-auto p-6">
      <header class="mb-8">
        <h1 class="text-2xl font-bold text-slate-800">不動産資料 翻訳ツール</h1>
        <p class="text-sm text-slate-500 mt-1">
          PowerPoint / PDF をアップロードすると、レイアウトを維持したまま翻訳します。
        </p>
      </header>

      <!-- 翻訳エンジンの案内 -->
      <section class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-6 text-xs text-blue-800 flex items-start gap-2">
        <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
        </svg>
        <div>
          セルフホストの <span class="font-medium">LibreTranslate</span> で翻訳しています。社内ネットワーク内で完結し、外部にデータを送信しません。使用量の上限はありません。
        </div>
      </section>

      <!-- アップロードフォーム -->
      <section class="bg-white rounded-lg shadow-sm p-6 border border-slate-200">
        <form id="translate-form" class="space-y-5">
          <!-- 言語選択 -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="source_lang" class="block text-sm font-medium text-slate-700 mb-1">翻訳元</label>
              <select id="source_lang" name="source_lang" class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="ja" selected>日本語</option>
                <option value="en">英語</option>
                <option value="zh">中国語</option>
              </select>
            </div>
            <div>
              <label for="target_lang" class="block text-sm font-medium text-slate-700 mb-1">翻訳先</label>
              <select id="target_lang" name="target_lang" class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="en" selected>英語</option>
                <option value="zh">中国語</option>
                <option value="ja">日本語</option>
              </select>
            </div>
          </div>

          <!-- ドロップゾーン -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">ファイル</label>
            <label id="dropzone" for="file-input" class="flex flex-col items-center justify-center w-full h-44 border-2 border-dashed border-slate-300 rounded-lg cursor-pointer hover:bg-slate-50 transition-colors">
              <svg class="w-10 h-10 text-slate-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.9A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
              </svg>
              <p id="file-label" class="text-sm text-slate-600">
                <span class="font-semibold text-blue-600">クリックして選択</span> または ドラッグ&ドロップ
              </p>
              <p class="text-xs text-slate-400 mt-1">.pptx / .pdf (最大20MB)</p>
              <input id="file-input" type="file" name="file" accept=".pptx,.pdf" class="hidden" />
            </label>
          </div>

          <!-- 実行ボタン -->
          <button id="submit-btn" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-medium py-2.5 rounded-md transition-colors flex items-center justify-center gap-2">
            <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="submit-text">翻訳を実行</span>
          </button>
        </form>

        <!-- ステータス表示 -->
        <div id="status" class="mt-4 hidden">
          <div id="status-content" class="text-sm px-4 py-3 rounded-md"></div>
        </div>
      </section>

      <footer class="mt-8 text-center text-xs text-slate-400">
        <p>LibreTranslate（セルフホスト）で翻訳しています。不動産用語は業界用語集で自動補正されます。</p>
      </footer>
    </div>

    <script>
      const form = document.getElementById("translate-form");
      const fileInput = document.getElementById("file-input");
      const fileLabel = document.getElementById("file-label");
      const dropzone = document.getElementById("dropzone");
      const submitBtn = document.getElementById("submit-btn");
      const submitText = document.getElementById("submit-text");
      const spinner = document.getElementById("spinner");
      const statusBox = document.getElementById("status");
      const statusContent = document.getElementById("status-content");
      const sourceLang = document.getElementById("source_lang");
      const targetLang = document.getElementById("target_lang");

      // ファイル選択時のラベル更新
      function updateFileLabel(file) {
        if (file) {
          fileLabel.innerHTML = `<span class="font-semibold text-slate-800">${file.name}</span> <span class="text-slate-500">(${(file.size / 1024 / 1024).toFixed(1)}MB)</span>`;
        }
      }
      fileInput.addEventListener("change", (e) => updateFileLabel(e.target.files[0]));

      // ドラッグ&ドロップ
      ["dragenter", "dragover"].forEach((ev) =>
        dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          dropzone.classList.add("drop-active");
        })
      );
      ["dragleave", "drop"].forEach((ev) =>
        dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          dropzone.classList.remove("drop-active");
        })
      );
      dropzone.addEventListener("drop", (e) => {
        const file = e.dataTransfer.files[0];
        if (file) {
          fileInput.files = e.dataTransfer.files;
          updateFileLabel(file);
        }
      });

      // 言語の重複防止
      function preventSameLang() {
        if (sourceLang.value === targetLang.value) {
          const alt = sourceLang.value === "en" ? "ja" : "en";
          targetLang.value = alt;
        }
      }
      sourceLang.addEventListener("change", preventSameLang);
      targetLang.addEventListener("change", preventSameLang);

      // ステータス表示
      function showStatus(message, type) {
        statusBox.classList.remove("hidden");
        statusContent.className = "text-sm px-4 py-3 rounded-md";
        if (type === "error") {
          statusContent.classList.add("bg-red-50", "text-red-700", "border", "border-red-200");
        } else if (type === "success") {
          statusContent.classList.add("bg-green-50", "text-green-700", "border", "border-green-200");
        } else {
          statusContent.classList.add("bg-blue-50", "text-blue-700", "border", "border-blue-200");
        }
        statusContent.textContent = message;
      }

      // フォーム送信
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const file = fileInput.files[0];
        if (!file) {
          showStatus("ファイルを選択してください", "error");
          return;
        }

        const fd = new FormData();
        fd.append("file", file);
        fd.append("source_lang", sourceLang.value);
        fd.append("target_lang", targetLang.value);

        submitBtn.disabled = true;
        submitText.textContent = "翻訳中...（数十秒かかります）";
        spinner.classList.remove("hidden");
        showStatus("翻訳しています。ファイルサイズによっては1分以上かかることがあります。", "info");

        try {
          const res = await fetch("/api/translate", { method: "POST", body: fd });
          if (!res.ok) {
            let msg = "翻訳に失敗しました";
            try {
              const err = await res.json();
              msg = err.detail || msg;
            } catch {}
            throw new Error(msg);
          }

          const blob = await res.blob();
          // Content-Disposition から推奨ファイル名を抽出
          const cd = res.headers.get("Content-Disposition") || "";
          const match = cd.match(/filename\*=UTF-8''([^;]+)/);
          const filename = match
            ? decodeURIComponent(match[1])
            : `translated_${targetLang.value}.${file.name.split(".").pop()}`;

          // ダウンロード
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);

          showStatus(`翻訳完了: ${filename} をダウンロードしました`, "success");
        } catch (err) {
          showStatus(err.message || "エラーが発生しました", "error");
        } finally {
          submitBtn.disabled = false;
          submitText.textContent = "翻訳を実行";
          spinner.classList.add("hidden");
        }
      });
    </script>
  </body>
</html>
